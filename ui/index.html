<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miku Desktop Pet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <div id="chat-history-list" class="chat-history-list"></div>
      <div id="bubble" class="bubble" hidden>你好呀～</div>
      <div id="live2d-stage"></div>
      <!-- 工具调用提示框容器 -->
      <div id="tool-call-toasts" class="tool-call-toasts"></div>
      <!-- 图片预览容器 -->
      <div id="image-preview-container" class="image-preview-container" hidden>
        <div id="image-preview-list" class="image-preview-list"></div>
        <button id="clear-images-btn" type="button" title="清除所有图片">×</button>
      </div>
      <!-- 拖拽覆盖层 -->
      <div id="drag-overlay" class="drag-overlay" hidden>
        <div class="drag-hint">释放以添加图片</div>
      </div>
      <form id="chat-form" class="chat-form">
        <input id="image-input" type="file" accept="image/*" multiple hidden />
        <button id="image-btn" type="button" title="选择图片">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5-7l-3 3.72L9 13l-3 4h12l-4-5z" />
          </svg>
        </button>
        <input id="chat-input" type="text" placeholder="和我说点什么..." maxlength="300" autocomplete="off" />
        <button id="send-btn" type="submit" aria-label="发送">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
          </svg>
        </button>
        <button id="settings-btn" type="button" aria-label="打开设置" title="设置">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19.43 12.98c.04-.32.07-.65.07-.98s-.03-.66-.07-.98l2.11-1.65a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.61-.22l-2.49 1a7.27 7.27 0 0 0-1.69-.98l-.38-2.65a.5.5 0 0 0-.5-.42h-4a.5.5 0 0 0-.5.42l-.38 2.65c-.6.24-1.16.56-1.69.98l-2.49-1a.5.5 0 0 0-.61.22l-2 3.46a.5.5 0 0 0 .12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65a.5.5 0 0 0-.12.64l2 3.46c.13.22.39.31.61.22l2.49-1c.53.42 1.09.74 1.69.98l.38 2.65c.05.24.26.42.5.42h4c.24 0 .45-.18.5-.42l.38-2.65c.6-.24 1.16-.56 1.69-.98l2.49 1c.22.09.48 0 .61-.22l2-3.46a.5.5 0 0 0-.12-.64l-2.11-1.65ZM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z" />
          </svg>
        </button>
      </form>
      <!-- 截屏确认对话框 -->
      <div id="screenshot-confirm-dialog" class="screenshot-confirm-overlay" hidden aria-hidden="true">
        <div class="screenshot-confirm-modal" role="dialog" aria-modal="true" aria-labelledby="screenshot-confirm-title">
          <div class="screenshot-confirm-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" />
            </svg>
          </div>
          <div id="screenshot-confirm-title" class="screenshot-confirm-title">截屏请求</div>
          <div class="screenshot-confirm-message" id="screenshot-confirm-message">
            Agent 请求截取屏幕，是否允许？
          </div>
          <div class="screenshot-confirm-actions">
            <button id="screenshot-deny-btn" type="button" class="screenshot-btn screenshot-btn-deny">拒绝</button>
            <button id="screenshot-allow-btn" type="button" class="screenshot-btn screenshot-btn-allow">允许</button>
          </div>
        </div>
      </div>
    </div>
    <script src="/live2dcubismcore.min.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
