<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>设置</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="settings-window">
      <header class="settings-titlebar">
        <div class="settings-title">设置面板</div>
        <div class="window-actions">
          <button id="settings-min-btn" class="window-btn" type="button" aria-label="最小化">─</button>
          <button id="settings-close-btn" class="window-btn window-btn-close" type="button" aria-label="关闭">✕</button>
        </div>
      </header>
      <div class="settings-layout">
        <aside class="settings-sidebar" id="settings-sidebar">
          <button class="settings-tab active" type="button" data-page="model">模型管理</button>
          <button class="settings-tab" type="button" data-page="llm">LLM配置</button>
          <button class="settings-tab" type="button" data-page="motion">表情控制</button>
          <button class="settings-tab" type="button" data-page="memory">会话记忆</button>
          <button class="settings-tab" type="button" data-page="tools">工具调用</button>
          <button class="settings-tab" type="button" data-page="mcp">MCP</button>
          <button class="settings-tab" type="button" data-page="multimodal">多模态</button>
        </aside>
        <section class="settings-content">
          <div class="settings-page active" data-page="model">
            <div class="model-manager">
              <button id="import-model-btn" class="import-model-btn" type="button">导入模型文件夹</button>
              <div class="transform-controls">
                <label class="slider-row" for="slider-offset-x">
                  <span>水平位置</span>
                  <input id="slider-offset-x" type="range" min="-220" max="220" step="1" value="0" />
                  <span id="slider-offset-x-value">0</span>
                </label>
                <label class="slider-row" for="slider-offset-y">
                  <span>垂直位置</span>
                  <input id="slider-offset-y" type="range" min="-500" max="1000" step="1" value="0" />
                  <span id="slider-offset-y-value">0</span>
                </label>
                <label class="checkbox-row" for="checkbox-follow-cursor">
                  <span>视线跟随光标</span>
                  <input id="checkbox-follow-cursor" type="checkbox" checked />
                </label>
              </div>
              <div id="import-preview" class="import-preview" hidden>
                <div class="preview-title">导入预览</div>
                <div id="preview-name" class="preview-line"></div>
                <div id="preview-type" class="preview-line"></div>
                <div id="preview-entry" class="preview-line"></div>
                <div class="preview-actions">
                  <button id="confirm-import-btn" class="preview-btn" type="button">确认导入</button>
                  <button id="cancel-import-btn" class="preview-btn preview-btn-ghost" type="button">取消</button>
                </div>
              </div>
              <div id="model-list" class="model-list"></div>
            </div>
          </div>
          <div class="settings-page" data-page="llm">
            <div class="llm-config-panel">
              <label class="llm-field">
                <span>URL</span>
                <input id="llm-base-url" type="text" placeholder="请输入模型服务 URL" />
              </label>
              <label class="llm-field">
                <span>API Key</span>
                <input id="llm-api-key" type="text" placeholder="请输入 API Key" />
              </label>
              <div class="llm-row-two">
                <label class="llm-field llm-field-main">
                  <span>模型名称</span>
                  <input id="llm-model-name" type="text" placeholder="请输入模型名称" />
                </label>
                <label class="llm-field llm-field-side">
                  <span>模型温度</span>
                  <input id="llm-temperature" type="number" step="0.1" min="0" max="2" placeholder="0.7" />
                </label>
              </div>
              <div class="llm-divider"></div>
              <div class="llm-prompt-section">
                <div class="llm-prompt-title">角色设定</div>
                <div class="llm-row-two">
                  <label class="llm-field llm-field-main">
                    <span>AI名字</span>
                    <input id="llm-name" type="text" placeholder="日和" />
                  </label>
                  <label class="llm-field llm-field-side">
                    <span>对用户称呼</span>
                    <input id="llm-address" type="text" placeholder="主人" />
                  </label>
                </div>
                <label class="llm-field">
                  <span>性格特点</span>
                  <input id="llm-feature" type="text" placeholder="可爱" />
                </label>
                <label class="llm-field">
                  <span>人设</span>
                  <input id="llm-character" type="text" placeholder="AI少女" />
                </label>
                <label class="llm-field llm-field-multiline">
                  <span>详细性格</span>
                  <textarea id="llm-characteristic" placeholder="拥有自己的情绪，会随着聊天氛围而变化，会哭、会笑、会撒娇"></textarea>
                </label>
                <label class="llm-field llm-field-multiline">
                  <span>发言约束</span>
                  <textarea id="llm-constraint" placeholder="回复时不要使用AI的语气，不要带有任何的emoji，也不要用markdown格式"></textarea>
                </label>
              </div>
              <label class="llm-field llm-field-multiline llm-field-readonly">
                <span>系统提示词预览</span>
                <textarea id="llm-system-prompt" readonly placeholder="根据上方设置自动生成"></textarea>
              </label>
              <button id="llm-confirm-btn" type="button" class="llm-confirm-btn">确认</button>
            </div>
          </div>
          <div class="settings-page" data-page="motion">
            <div class="motion-panel">
              <div class="motion-table-wrap">
                <table class="motion-table">
                  <thead>
                    <tr>
                      <th class="col-name">动作名称</th>
                      <th class="col-label">标签</th>
                      <th class="col-preview">预览</th>
                      <th class="col-setting">设置</th>
                    </tr>
                  </thead>
                  <tbody id="motion-table-body"></tbody>
                </table>
                <div id="motion-empty" class="motion-empty" hidden>当前模型无动作数据</div>
              </div>
              <label class="llm-field llm-field-multiline llm-field-readonly motion-prompt-preview">
                <span>系统提示词预览（含表情标签）</span>
                <textarea id="motion-system-prompt" readonly placeholder="配置表情标签后，提示词将在此显示"></textarea>
              </label>
              <button id="motion-confirm-btn" type="button" class="motion-confirm-btn">保存配置</button>
            </div>
          </div>
          <div class="settings-page" data-page="memory"><div class="page-placeholder">功能开发中</div></div>
          <div class="settings-page" data-page="tools">
            <div class="tools-panel">
              <div class="tools-table-wrap">
                <table class="tools-table">
                  <thead>
                    <tr>
                      <th class="col-check">启用</th>
                      <th>工具名称</th>
                    </tr>
                  </thead>
                  <tbody id="tools-table-body"></tbody>
                </table>
                <div id="tools-empty" class="tools-empty" hidden>未发现可用工具</div>
              </div>
              <button id="tools-confirm-btn" type="button" class="tools-confirm-btn">确认</button>
            </div>
          </div>
          <div class="settings-page" data-page="mcp"><div class="page-placeholder">功能开发中</div></div>
          <div class="settings-page" data-page="multimodal">
            <div class="multimodal-panel">
              <div class="multimodal-section">
                <div class="multimodal-section-title">截图设置</div>
                <label class="checkbox-row" for="checkbox-hide-on-screenshot">
                  <span>截屏时隐藏界面</span>
                  <input id="checkbox-hide-on-screenshot" type="checkbox" checked />
                </label>
                <div class="multimodal-hint">开启后，截屏时会暂时隐藏 Live2D 模型、对话框和聊天界面</div>
              </div>
            </div>
          </div>
        </section>
      </div>
      <div id="delete-confirm-dialog" class="confirm-overlay" hidden aria-hidden="true">
        <div class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="delete-confirm-title">
          <div class="confirm-header">
            <div class="confirm-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M12 2.8L22.3 20a1.2 1.2 0 01-1 1.8H2.7a1.2 1.2 0 01-1-1.8L12 2.8zm0 5a1.2 1.2 0 00-1.2 1.2V13a1.2 1.2 0 102.4 0V9A1.2 1.2 0 0012 7.8zm0 9.8a1.4 1.4 0 100-2.8 1.4 1.4 0 000 2.8z" />
              </svg>
            </div>
            <div id="delete-confirm-title" class="confirm-title">删除模型确认</div>
          </div>
          <div class="confirm-message">将删除该模型所有的配置文件和会话记忆，请谨慎操作</div>
          <div class="confirm-actions">
            <button id="delete-confirm-cancel" type="button" class="confirm-btn confirm-btn-ghost">取消</button>
            <button id="delete-confirm-ok" type="button" class="confirm-btn confirm-btn-danger">确认删除</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/settings/settings.ts"></script>
  </body>
</html>
